<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿弥陀佛</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        img {
            max-width: 100%;
            max-height: 90vh;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        
        .error-message {
            color: #666;
            padding: 20px;
            display: none;
        }
        
        img:error + .error-message {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="Log image" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="error-message">
            Unable to load logo.jpg. Please make sure:
            <ul style="text-align: left; margin-top: 10px;">
                <li>The file exists in the same folder as this HTML file</li>
                <li>The filename is exactly "logo.jpg" (case-sensitive)</li>
                <li>The file is a valid JPG image</li>
            </ul>
        </div>
    </div>
</body>
</html>
